baseURL = "https://happierpig.github.io/"
DefaultContentLanguage = "zh" # Theme's display language, supports: en, fr, zh, zh-hant
languageCode = "en-us"
title = "Pigpen Park"
copyright = "2021 happypig"
theme = "diary"
GoogleAnalytics = "G-KGF6W04P5B"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    style = "perldoc"
    tabWidth = 4

[params]
subtitle = "Happypig :)"
enableGitalk = false
enableUtterances = true
favicon = "/favicon.ico"
googleSearchCode = "90d44f4cba853cf8a"
enableReadingTime=true


# Twitter Card and Open Graph settings
enableOpenGraph = true
enableTwitterCards = true
title = "My Blog" # will set 'og:site_name'
description = "My HomePage Description"  # will set 'og:description'

[params.utterances]
repo="happierpig/happierpig.github.io"
term="title"
label="Comment"
theme="github-light"

[taxonomies]
   tag = "tags"
   category = "categories"

[[menu.main]]
url = "/posts"
name = "网志"
weight = 1
[[menu.main]]
url = "/categories"
name = "分类"
weight = 2
[[menu.main]]
url = "/tags"
name = "标签"
weight = 3